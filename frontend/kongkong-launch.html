<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>正在进入空空工作台</title>
    <script>
        (function bootstrapKongKongLaunch() {
            function normalizeGatewayUrl(url) {
                const value = String(url || '').trim();
                if (!value) return 'default';
                try {
                    const parsed = new URL(value, window.location.origin + window.location.pathname);
                    const path = parsed.pathname === '/' ? '' : (parsed.pathname.replace(/\/+$/, '') || parsed.pathname);
                    return parsed.protocol + '//' + parsed.host + path;
                } catch (_error) {
                    return value;
                }
            }

            function fail(message) {
                document.addEventListener('DOMContentLoaded', function onReady() {
                    const status = document.getElementById('status');
                    if (status) {
                        status.textContent = message;
                    }
                });
            }

            const params = new URLSearchParams(window.location.search);
            const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : window.location.hash;
            const hashParams = new URLSearchParams(hash);
            const slug = (params.get('slug') || '').trim();
            const token = (hashParams.get('token') || '').trim();

            if (!slug || !token) {
                fail('入口参数缺失，无法自动进入空空工作台。请返回平台重新点击“进入空空工作台”。');
                return;
            }

            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const gatewayUrl = wsProtocol + '//' + window.location.host + '/kongkong/' + encodeURIComponent(slug);
            const storageKey = 'openclaw.control.token.v1:' + normalizeGatewayUrl(gatewayUrl);

            try {
                window.sessionStorage.removeItem('openclaw.control.token.v1');
                window.sessionStorage.setItem(storageKey, token);

                const settingsKey = 'openclaw.control.settings.v1';
                let settings = {};
                try {
                    settings = JSON.parse(window.localStorage.getItem(settingsKey) || '{}') || {};
                } catch (_error) {
                    settings = {};
                }
                settings.gatewayUrl = gatewayUrl;
                if (!settings.sessionKey) settings.sessionKey = 'main';
                if (!settings.lastActiveSessionKey) settings.lastActiveSessionKey = settings.sessionKey;
                window.localStorage.setItem(settingsKey, JSON.stringify(settings));
            } catch (_error) {
                fail('浏览器未能写入空空工作台的临时凭证，请检查是否禁用了站点存储。');
                return;
            }

            window.location.replace('/kongkong/' + encodeURIComponent(slug) + '/');
        })();
    </script>
    <style>
        :root {
            color-scheme: dark;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #07111d;
            color: #dbeafe;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(34, 211, 238, 0.15), transparent 40%),
                linear-gradient(180deg, #07111d 0%, #020617 100%);
        }
        .panel {
            width: min(92vw, 520px);
            padding: 32px 28px;
            border: 1px solid rgba(34, 211, 238, 0.18);
            border-radius: 24px;
            background: rgba(7, 17, 29, 0.88);
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
        }
        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }
        p {
            margin: 0;
            line-height: 1.7;
            color: rgba(219, 234, 254, 0.78);
        }
    </style>
</head>
<body>
    <section class="panel">
        <h1>正在进入空空工作台</h1>
        <p id="status">正在为你安全注入访问凭证，并跳转到 OpenClaw 控制台……</p>
    </section>
</body>
</html>
