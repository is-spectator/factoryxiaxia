<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>员工管理 | 虾虾工厂管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050714; color: #ffffff; }
        .glass-morphism { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .sidebar-active { background-color: rgba(106,13,173,0.2); border-left: 3px solid #6A0DAD; color: #fff; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 1rem; }
        .modal-bg { background: rgba(0,0,0,0.7); }
        .toast { position: fixed; top: 80px; right: 20px; z-index: 999; padding: 12px 24px; border-radius: 12px; font-size: 13px; animation: slideIn 0.3s ease; }
        .toast-ok { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
        .toast-err { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col">
<nav class="fixed top-0 w-full z-50 glass-morphism px-6 py-4 flex items-center justify-between">
    <div class="flex items-center space-x-4">
        <a class="flex items-center space-x-2" href="index.html"><span class="iconify text-3xl text-[#6A0DAD]" data-icon="mdi:shrimp"></span><span class="text-2xl font-bold tracking-tighter uppercase">虾虾工厂</span></a>
        <span class="bg-red-500/20 text-red-400 text-[10px] px-2 py-0.5 rounded-full font-bold">ADMIN</span>
    </div>
    <div class="flex items-center space-x-4">
        <a href="index.html" class="text-xs text-gray-400 hover:text-white transition">返回前台</a>
        <button onclick="logout()" class="text-xs text-red-400 hover:text-red-300 transition">退出</button>
    </div>
</nav>
<div class="flex pt-16 min-h-screen">
    <aside class="w-56 border-r border-white/5 bg-black/20 hidden lg:block fixed top-16 bottom-0 overflow-y-auto">
        <nav class="p-4 space-y-1">
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mb-3 ml-3">总览</p>
            <a class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition text-sm" href="admin.html"><span class="iconify" data-icon="mdi:view-dashboard-outline"></span><span>数据看板</span></a>
            <p class="text-[10px] font-bold text-gray-600 uppercase tracking-widest mt-6 mb-3 ml-3">管理</p>
            <a class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition text-sm" href="admin-users.html"><span class="iconify" data-icon="mdi:account-group-outline"></span><span>用户管理</span></a>
            <a class="sidebar-active flex items-center space-x-3 px-4 py-2.5 rounded-lg transition text-sm" href="admin-workers.html"><span class="iconify" data-icon="mdi:robot-outline"></span><span>员工管理</span></a>
            <a class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition text-sm" href="admin-orders.html"><span class="iconify" data-icon="mdi:clipboard-list-outline"></span><span>订单管理</span></a>
            <a class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition text-sm" href="admin-deployments.html"><span class="iconify" data-icon="mdi:rocket-launch-outline"></span><span>部署管理</span></a>
            <a class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-gray-400 hover:bg-white/5 hover:text-white transition text-sm" href="admin-conversations.html"><span class="iconify" data-icon="mdi:chat-outline"></span><span>会话监控</span></a>
        </nav>
    </aside>
    <main class="flex-grow lg:ml-56 p-6 lg:p-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-2xl font-bold">数字员工管理</h1>
                <div class="flex gap-3">
                    <input id="kw" type="text" placeholder="搜索名称/技能..." class="bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500 w-48"/>
                    <select id="status-filter" onchange="loadWorkers()" class="bg-white/5 border border-white/20 rounded-lg px-3 py-2 text-sm focus:outline-none">
                        <option value="">全部状态</option>
                        <option value="online">在线</option>
                        <option value="busy">忙碌</option>
                        <option value="offline">离线</option>
                    </select>
                    <button onclick="loadWorkers()" class="bg-white/5 border border-white/10 px-4 py-2 rounded-lg text-sm transition hover:bg-white/10">搜索</button>
                    <button onclick="openModal()" class="bg-[#6A0DAD] hover:bg-[#8A2BE2] px-4 py-2 rounded-lg text-sm font-bold transition">+ 新增员工</button>
                </div>
            </div>
            <div class="card overflow-hidden">
                <table class="w-full text-sm text-left">
                    <thead class="bg-white/5 text-gray-400 text-xs uppercase">
                        <tr><th class="px-4 py-3">ID</th><th class="px-4 py-3">员工</th><th class="px-4 py-3">分类</th><th class="px-4 py-3">等级</th><th class="px-4 py-3">单价</th><th class="px-4 py-3">状态</th><th class="px-4 py-3">评分</th><th class="px-4 py-3">订单数</th><th class="px-4 py-3">操作</th></tr>
                    </thead>
                    <tbody id="worker-tbody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
            <div id="pagination" class="flex justify-center mt-6 space-x-2"></div>
        </div>
    </main>
</div>

<!-- 新增/编辑弹窗 -->
<div id="modal" class="hidden fixed inset-0 z-[100] modal-bg flex items-center justify-center">
    <div class="glass-morphism rounded-2xl p-8 w-full max-w-lg max-h-[90vh] overflow-y-auto">
        <h2 class="text-lg font-bold mb-6" id="modal-title">新增数字员工</h2>
        <div class="space-y-4">
            <input type="hidden" id="f-id"/>
            <div><label class="text-xs text-gray-400 block mb-1">名称 *</label><input id="f-name" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"/></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs text-gray-400 block mb-1">分类 *</label><select id="f-cat" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none"></select></div>
                <div><label class="text-xs text-gray-400 block mb-1">单价 *</label><input id="f-rate" type="number" step="0.01" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500"/></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs text-gray-400 block mb-1">等级 (1-10)</label><input id="f-level" type="number" min="1" max="10" value="5" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none"/></div>
                <div><label class="text-xs text-gray-400 block mb-1">计费方式</label><select id="f-billing" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none"><option>时薪</option><option>月租</option><option>按件计费</option></select></div>
            </div>
            <div><label class="text-xs text-gray-400 block mb-1">技能标签 (逗号分隔)</label><input id="f-skills" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500" placeholder="React,Node.js,Go"/></div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs text-gray-400 block mb-1">图标</label><input id="f-icon" value="mdi:robot-happy-outline" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none"/></div>
                <div><label class="text-xs text-gray-400 block mb-1">状态</label><select id="f-status" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none"><option value="online">在线</option><option value="busy">忙碌</option><option value="offline">离线</option></select></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div><label class="text-xs text-gray-400 block mb-1">渐变色起始</label><input id="f-gfrom" type="color" value="#6A0DAD" class="w-full h-10 rounded-lg bg-transparent border border-white/20 cursor-pointer"/></div>
                <div><label class="text-xs text-gray-400 block mb-1">渐变色结束</label><input id="f-gto" type="color" value="#00D2FF" class="w-full h-10 rounded-lg bg-transparent border border-white/20 cursor-pointer"/></div>
            </div>
            <div><label class="text-xs text-gray-400 block mb-1">详细介绍</label><textarea id="f-desc" rows="3" class="w-full bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500 resize-none"></textarea></div>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="closeModal()" class="flex-1 border border-white/20 py-2 rounded-lg text-sm hover:bg-white/5 transition">取消</button>
            <button onclick="saveWorker()" id="save-btn" class="flex-1 bg-[#6A0DAD] hover:bg-[#8A2BE2] py-2 rounded-lg text-sm font-bold transition">保存</button>
        </div>
    </div>
</div>

<script>
const token = localStorage.getItem('xiaxia_token');
if (!token) window.location.href = 'login.html';
function logout() { localStorage.removeItem('xiaxia_token'); localStorage.removeItem('xiaxia_user'); window.location.href = 'login.html'; }

let currentPage = 1;
let categories = [];
const statusLabel = { online: '<span class="text-green-400">在线</span>', busy: '<span class="text-orange-400">忙碌</span>', offline: '<span class="text-gray-500">离线</span>' };
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg, ok) { const el = document.createElement('div'); el.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err'); el.textContent = msg; document.body.appendChild(el); setTimeout(() => el.remove(), 3000); }

document.getElementById('kw').addEventListener('keydown', e => { if (e.key === 'Enter') loadWorkers(); });

async function loadCategories() {
    const res = await fetch('/api/categories');
    const d = await res.json();
    categories = d.categories;
    const sel = document.getElementById('f-cat');
    sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function loadWorkers() {
    const kw = document.getElementById('kw').value.trim();
    const status = document.getElementById('status-filter').value;
    let url = `/api/admin/workers?page=${currentPage}&per_page=15`;
    if (kw) url += `&keyword=${encodeURIComponent(kw)}`;
    if (status) url += `&status=${status}`;

    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token }});
    if (res.status === 403) { toast('无管理员权限', false); return; }
    const d = await res.json();

    document.getElementById('worker-tbody').innerHTML = d.workers.map(w => `
        <tr class="hover:bg-white/5">
            <td class="px-4 py-3 text-gray-500">${w.id}</td>
            <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,${w.avatar_gradient_from},${w.avatar_gradient_to})">
                        <span class="iconify text-sm" data-icon="${w.avatar_icon}"></span>
                    </div>
                    <span class="font-medium">${esc(w.name)}</span>
                </div>
            </td>
            <td class="px-4 py-3 text-gray-400 text-xs">${esc(w.category_name)}</td>
            <td class="px-4 py-3">Lv.${w.level}</td>
            <td class="px-4 py-3">￥${w.hourly_rate.toFixed(2)}</td>
            <td class="px-4 py-3">${statusLabel[w.status] || w.status}</td>
            <td class="px-4 py-3">${w.rating}</td>
            <td class="px-4 py-3">${w.total_orders}</td>
            <td class="px-4 py-3 space-x-2">
                <button onclick="editWorker(${w.id})" class="text-xs text-cyan-400 hover:text-cyan-300">编辑</button>
                <button onclick="toggleStatus(${w.id},'${w.status}')" class="text-xs ${w.status==='offline'?'text-green-400':'text-orange-400'} hover:opacity-80">${w.status==='offline'?'上架':'下架'}</button>
                <button onclick="deleteWorker(${w.id})" class="text-xs text-red-400 hover:text-red-300">删除</button>
            </td>
        </tr>
    `).join('') || '<tr><td colspan="9" class="text-center py-10 text-gray-500">暂无员工</td></tr>';

    renderPagination(d.page, d.pages);
}

function openModal(worker) {
    document.getElementById('modal').classList.remove('hidden');
    if (worker) {
        document.getElementById('modal-title').textContent = '编辑数字员工';
        document.getElementById('f-id').value = worker.id;
        document.getElementById('f-name').value = worker.name;
        document.getElementById('f-cat').value = worker.category_id;
        document.getElementById('f-rate').value = worker.hourly_rate;
        document.getElementById('f-level').value = worker.level;
        document.getElementById('f-billing').value = worker.billing_unit;
        document.getElementById('f-skills').value = (worker.skills || []).join(',');
        document.getElementById('f-icon').value = worker.avatar_icon;
        document.getElementById('f-status').value = worker.status;
        document.getElementById('f-gfrom').value = worker.avatar_gradient_from;
        document.getElementById('f-gto').value = worker.avatar_gradient_to;
        document.getElementById('f-desc').value = worker.description;
    } else {
        document.getElementById('modal-title').textContent = '新增数字员工';
        document.getElementById('f-id').value = '';
        ['f-name','f-skills','f-desc'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-rate').value = '';
        document.getElementById('f-level').value = 5;
        document.getElementById('f-icon').value = 'mdi:robot-happy-outline';
        document.getElementById('f-status').value = 'online';
        document.getElementById('f-gfrom').value = '#6A0DAD';
        document.getElementById('f-gto').value = '#00D2FF';
    }
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

async function editWorker(id) {
    const res = await fetch(`/api/workers/${id}`);
    const d = await res.json();
    openModal(d.worker);
}

async function saveWorker() {
    const id = document.getElementById('f-id').value;
    const body = {
        name: document.getElementById('f-name').value.trim(),
        category_id: parseInt(document.getElementById('f-cat').value),
        hourly_rate: parseFloat(document.getElementById('f-rate').value),
        level: parseInt(document.getElementById('f-level').value),
        billing_unit: document.getElementById('f-billing').value,
        skills: document.getElementById('f-skills').value.trim(),
        avatar_icon: document.getElementById('f-icon').value.trim(),
        status: document.getElementById('f-status').value,
        avatar_gradient_from: document.getElementById('f-gfrom').value,
        avatar_gradient_to: document.getElementById('f-gto').value,
        description: document.getElementById('f-desc').value.trim(),
    };
    if (!body.name) { toast('请填写员工名称', false); return; }
    if (!body.hourly_rate || body.hourly_rate <= 0) { toast('请填写有效的单价（大于0）', false); return; }
    if (body.level < 1 || body.level > 10 || isNaN(body.level)) { toast('等级须为1-10之间的整数', false); return; }
    if (isNaN(body.category_id)) { toast('请选择分类', false); return; }

    const url = id ? `/api/admin/workers/${id}` : '/api/admin/workers';
    const method = id ? 'PUT' : 'POST';
    const res = await fetch(url, { method, headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const d = await res.json();
    if (!res.ok) { toast(d.error || '保存失败', false); return; }
    toast(id ? '员工信息已更新' : '新员工已创建', true);
    closeModal();
    loadWorkers();
}

async function toggleStatus(id, current) {
    const newStatus = current === 'offline' ? 'online' : 'offline';
    await fetch(`/api/admin/workers/${id}`, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, body: JSON.stringify({ status: newStatus }) });
    loadWorkers();
}

async function deleteWorker(id) {
    if (!confirm(`确定删除该员工？`)) return;
    await fetch(`/api/admin/workers/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
    loadWorkers();
}

function renderPagination(page, pages) {
    const c = document.getElementById('pagination');
    if (pages <= 1) { c.innerHTML = ''; return; }
    let h = '';
    if (page > 1) h += `<button onclick="goPage(${page-1})" class="px-3 py-1 rounded bg-white/5 hover:bg-white/10 text-sm">&laquo;</button>`;
    for (let i = 1; i <= pages; i++) {
        if (i === page) h += `<button class="px-3 py-1 rounded bg-[#6A0DAD] text-sm font-bold">${i}</button>`;
        else if (Math.abs(i-page)<=2||i===1||i===pages) h += `<button onclick="goPage(${i})" class="px-3 py-1 rounded bg-white/5 hover:bg-white/10 text-sm">${i}</button>`;
        else if (Math.abs(i-page)===3) h += '<span class="text-gray-500">...</span>';
    }
    if (page < pages) h += `<button onclick="goPage(${page+1})" class="px-3 py-1 rounded bg-white/5 hover:bg-white/10 text-sm">&raquo;</button>`;
    c.innerHTML = h;
}
function goPage(p) { currentPage = p; loadWorkers(); }

loadCategories();
loadWorkers();
</script>
</body>
</html>
