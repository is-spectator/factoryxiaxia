<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>数字员工市场 | 虾虾工厂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050714; color: #ffffff; }
        .glass-morphism { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .text-gradient { background: linear-gradient(90deg, #6A0DAD, #00D2FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover:hover { border-color: #6A0DAD; transform: translateY(-5px); transition: all 0.3s ease; }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(106,13,173,0.6); transform: translateY(-2px); }
        .cat-active { background: rgba(106,13,173,0.3); border-color: #6A0DAD; color: #fff; }
        .status-online { color: #22c55e; }
        .status-busy { color: #f97316; }
        .status-offline { color: #6b7280; }
        .status-dot-online { background: #22c55e; }
        .status-dot-busy { background: #f97316; }
        .status-dot-offline { background: #6b7280; }
        .quick-filter-active { background: linear-gradient(135deg, rgba(6,182,212,0.24), rgba(106,13,173,0.28)); border-color: rgba(34,211,238,0.6); color: #fff; }
        .official-spotlight { background: radial-gradient(circle at top left, rgba(34,211,238,0.18), transparent 45%), linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)); }
        .official-pill { background: rgba(34,211,238,0.12); color: #67e8f9; border: 1px solid rgba(34,211,238,0.24); }
    </style>
</head>
<body class="overflow-x-hidden min-h-screen">
<!-- 顶部导航栏 -->
<nav class="fixed top-0 w-full z-50 glass-morphism px-6 py-4 flex items-center justify-between">
    <div class="flex items-center space-x-10">
        <a class="flex items-center space-x-2" href="index.html">
            <span class="iconify text-3xl text-[#6A0DAD]" data-icon="mdi:shrimp"></span>
            <span class="text-2xl font-bold tracking-tighter uppercase">虾虾工厂 <span class="text-xs font-light text-cyan-400">XiaXia.Factory</span></span>
        </a>
        <div class="hidden lg:flex items-center space-x-8 text-sm font-medium text-gray-300">
            <a class="hover:text-white transition" href="index.html">首页</a>
            <a class="text-white transition" href="workers.html">数职市场</a>
            <a class="hover:text-white transition" href="orders.html">我的订单</a>
            <a class="hover:text-white transition" href="my-agents.html">我的机器人</a>
        </div>
    </div>
    <div class="flex items-center space-x-4" id="nav-auth">
        <a class="text-sm hover:text-white px-4 py-2 transition" href="profile.html"><span class="iconify inline mr-1" data-icon="mdi:account-outline"></span>个人中心</a>
        <a class="text-sm font-medium" href="login.html">登录</a>
        <a class="bg-[#6A0DAD] hover:bg-[#8A2BE2] px-6 py-2 rounded-full text-sm font-bold btn-glow transition" href="register.html">立即注册</a>
    </div>
</nav>

<main class="pt-28 pb-20 px-6 max-w-7xl mx-auto">
    <!-- 页头 -->
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold mb-4">数字员工<span class="text-gradient">人才市场</span></h1>
        <p class="text-gray-400 max-w-2xl mx-auto">浏览可直接售卖和交付的数字员工。既能按需租赁通用员工，也能购买官方机器人并直接拿到 API 服务。</p>
    </div>

    <section class="official-spotlight glass-morphism rounded-[2rem] p-8 md:p-10 mb-10">
        <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-6 mb-8">
            <div>
                <p class="official-pill inline-flex items-center gap-2 text-[11px] px-3 py-1 rounded-full uppercase tracking-[0.24em] mb-4">
                    <span class="iconify" data-icon="mdi:shield-star-outline"></span>官方数字员工专区
                </p>
                <h2 class="text-3xl font-bold mb-3">从选型到交付，一次完成</h2>
                <p class="text-sm text-gray-300 max-w-2xl leading-7">
                    官方上架的数字员工支持套餐购买、知识库配置、发布上线和公开 API 调用。
                    适合直接卖给企业客户，而不是只做内部演示。
                </p>
            </div>
            <button onclick="filterWorkerType('agent_service')" class="bg-cyan-400 hover:bg-cyan-300 text-black px-6 py-3 rounded-2xl font-bold transition inline-flex items-center justify-center">
                <span class="iconify mr-2" data-icon="mdi:rocket-launch-outline"></span>只看官方机器人
            </button>
        </div>
        <div id="official-featured" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <div class="rounded-3xl border border-white/10 bg-white/5 p-6 text-gray-500">加载官方机器人中...</div>
        </div>
    </section>

    <div class="flex flex-wrap gap-3 justify-center mb-10" id="quick-filters">
        <button onclick="filterWorkerType(null)" class="quick-filter-btn quick-filter-active px-4 py-2 rounded-full text-sm border border-white/15 transition" data-type="all">全部市场</button>
        <button onclick="filterWorkerType('agent_service')" class="quick-filter-btn px-4 py-2 rounded-full text-sm border border-white/15 text-gray-300 transition hover:border-cyan-400/50" data-type="agent_service">官方数字员工</button>
        <button onclick="presetKeyword('客服')" class="px-4 py-2 rounded-full text-sm border border-white/15 text-gray-300 transition hover:border-[#6A0DAD]">搜索客服类</button>
        <button onclick="presetKeyword('公众号')" class="px-4 py-2 rounded-full text-sm border border-white/15 text-gray-300 transition hover:border-[#6A0DAD]">搜索公众号类</button>
    </div>

    <!-- 搜索栏 -->
    <div class="relative max-w-3xl mx-auto mb-10">
        <span class="absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl">
            <span class="iconify" data-icon="mdi:magnify"></span>
        </span>
        <input id="search-input" class="w-full bg-white/5 border border-white/20 rounded-full py-4 px-16 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition" placeholder="搜索技能、职位名称..." type="text"/>
        <button onclick="doSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-2 rounded-full font-bold transition">搜索</button>
    </div>

    <!-- 分类筛选 -->
    <div class="flex flex-wrap gap-3 mb-6 justify-center" id="category-filters">
        <button onclick="filterCategory(null)" class="cat-btn cat-active px-4 py-2 rounded-full text-sm border border-white/20 transition hover:border-[#6A0DAD]" data-cat="all">全部</button>
    </div>

    <!-- 排序 -->
    <div class="flex justify-between items-center mb-8">
        <p class="text-sm text-gray-500">
            <span id="result-label">共</span> <span id="total-count">0</span> 位数字员工
        </p>
        <select id="sort-select" onchange="loadWorkers()" class="bg-white/5 border border-white/20 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-cyan-500">
            <option value="total_orders">按人气排序</option>
            <option value="rating">按评分排序</option>
            <option value="price_asc">价格从低到高</option>
            <option value="price_desc">价格从高到低</option>
            <option value="level">按等级排序</option>
        </select>
    </div>

    <!-- 员工卡片网格 -->
    <div id="workers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 mb-10">
        <div class="col-span-full text-center py-20 text-gray-500">加载中...</div>
    </div>

    <!-- 分页 -->
    <div id="pagination" class="flex justify-center items-center space-x-2"></div>
</main>

<!-- 页脚 -->
<footer class="py-6 px-6 border-t border-white/5 text-center text-xs text-gray-600 bg-black/30">
    <p>&copy; 2026 虾虾工厂 (XiaXia Factory Inc.)</p>
</footer>

<script>
    let currentPage = 1;
    let currentCategory = null;
    let currentKeyword = '';
    let currentWorkerType = null;
    const initialParams = new URLSearchParams(window.location.search);

    const officialCopyMap = {
        support_responder: {
            slogan: '把 FAQ、接待和转人工打成一套可售卖的客服 API。',
            chips: ['公开 API', '知识库问答', '转人工'],
        },
        wechat_official_account_manager: {
            slogan: '为企业交付可落地的公众号自动回复与内容运营机器人。',
            chips: ['公众号回复', '内容规划', '私域转化'],
        },
    };

    // 登录状态
    (function() {
        const token = localStorage.getItem('xiaxia_token');
        const userStr = localStorage.getItem('xiaxia_user');
        if (token && userStr) {
            const user = JSON.parse(userStr);
            document.getElementById('nav-auth').innerHTML = `
                <a class="text-sm hover:text-white px-4 py-2 transition" href="profile.html">
                    <span class="iconify inline mr-1" data-icon="mdi:account-outline"></span>${user.username}
                </a>
                <a class="text-sm hover:text-white px-4 py-2 transition" href="my-agents.html">
                    <span class="iconify inline mr-1" data-icon="mdi:rocket-launch-outline"></span>我的机器人
                </a>
                <a class="text-sm hover:text-white px-4 py-2 transition" href="orders.html">
                    <span class="iconify inline mr-1" data-icon="mdi:clipboard-list-outline"></span>我的订单
                </a>
                <button onclick="logout()" class="text-sm font-medium text-red-400 hover:text-red-300 transition">退出</button>
            `;
        }
    })();

    function logout() {
        localStorage.removeItem('xiaxia_token');
        localStorage.removeItem('xiaxia_user');
        window.location.reload();
    }

    function applyInitialFilters() {
        const workerType = initialParams.get('worker_type');
        const keyword = initialParams.get('keyword');
        if (workerType) currentWorkerType = workerType;
        if (keyword) {
            currentKeyword = keyword.trim();
            document.getElementById('search-input').value = currentKeyword;
        }
        syncWorkerTypeButtons();
    }

    function esc(value) {
        const div = document.createElement('div');
        div.textContent = value == null ? '' : String(value);
        return div.innerHTML;
    }

    // 加载分类
    async function loadCategories() {
        try {
            const res = await fetch('/api/categories');
            const data = await res.json();
            const container = document.getElementById('category-filters');
            data.categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'cat-btn px-4 py-2 rounded-full text-sm border border-white/20 text-gray-400 transition hover:border-[#6A0DAD] hover:text-white';
                btn.dataset.cat = cat.id;
                btn.innerHTML = `<span class="iconify inline mr-1" data-icon="${cat.icon}"></span>${cat.name}`;
                btn.onclick = () => filterCategory(cat.id);
                container.appendChild(btn);
            });
        } catch(e) { console.error(e); }
    }

    async function loadOfficialAgents() {
        try {
            const res = await fetch('/api/workers?worker_type=agent_service&per_page=4&sort_by=total_orders');
            const data = await res.json();
            renderOfficialFeatured(data.workers || []);
        } catch (e) {
            document.getElementById('official-featured').innerHTML = '<div class="col-span-full rounded-3xl border border-red-400/20 bg-red-500/5 p-6 text-red-300">官方数字员工加载失败，请稍后重试。</div>';
        }
    }

    function renderOfficialFeatured(workers) {
        const container = document.getElementById('official-featured');
        if (!workers || workers.length === 0) {
            container.innerHTML = '<div class="col-span-full rounded-3xl border border-white/10 bg-white/5 p-6 text-gray-400">当前还没有官方数字员工。</div>';
            return;
        }
        container.innerHTML = workers.map(w => {
            const meta = officialCopyMap[w.template_key] || { slogan: '支持下单、部署和公开 API 调用。', chips: ['官方上架', '可部署', '可售卖'] };
            return `
                <a href="worker-detail.html?id=${w.id}" class="group rounded-[1.75rem] border border-white/10 bg-black/20 p-6 hover:border-cyan-400/50 transition block">
                    <div class="flex items-start justify-between gap-4 mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-3xl flex items-center justify-center shadow-lg" style="background: linear-gradient(135deg, ${w.avatar_gradient_from}, ${w.avatar_gradient_to})">
                                <span class="iconify text-3xl" data-icon="${w.avatar_icon}"></span>
                            </div>
                            <div>
                                <p class="official-pill inline-flex items-center gap-1 text-[10px] px-2.5 py-1 rounded-full uppercase tracking-[0.2em] mb-2">
                                    <span class="iconify" data-icon="mdi:check-decagram-outline"></span>官方上架
                                </p>
                                <h3 class="text-xl font-bold">${esc(w.name)}</h3>
                                <p class="text-xs text-gray-400 mt-1">${esc(w.category_name)} · Lv.${esc(w.level)}</p>
                            </div>
                        </div>
                        <span class="text-xs text-cyan-300 border border-cyan-400/20 px-3 py-1 rounded-full">管理式部署</span>
                    </div>
                    <p class="text-sm text-gray-300 leading-7 mb-5">${esc(meta.slogan)}</p>
                    <div class="flex flex-wrap gap-2 mb-6">
                        ${meta.chips.map(chip => `<span class="text-[11px] px-3 py-1 rounded-full bg-white/5 border border-white/10 text-gray-200">${chip}</span>`).join('')}
                    </div>
                    <div class="flex items-end justify-between pt-5 border-t border-white/10">
                        <div>
                            <p class="text-xs text-gray-500">官方套餐起</p>
                            <p class="text-2xl font-bold">￥${Number(w.hourly_rate).toFixed(2)}<span class="text-xs text-gray-500 ml-1">/ 月</span></p>
                        </div>
                        <span class="inline-flex items-center gap-2 text-sm font-medium text-cyan-300 group-hover:text-cyan-200">
                            查看详情<span class="iconify" data-icon="mdi:arrow-right"></span>
                        </span>
                    </div>
                </a>
            `;
        }).join('');
    }

    function filterCategory(catId) {
        currentCategory = catId;
        currentPage = 1;
        document.querySelectorAll('.cat-btn').forEach(b => {
            b.classList.remove('cat-active', 'text-white');
            b.classList.add('text-gray-400');
        });
        const target = catId ? document.querySelector(`.cat-btn[data-cat="${catId}"]`) : document.querySelector('.cat-btn[data-cat="all"]');
        if (target) {
            target.classList.add('cat-active', 'text-white');
            target.classList.remove('text-gray-400');
        }
        loadWorkers();
    }

    function filterWorkerType(workerType) {
        currentWorkerType = workerType;
        currentPage = 1;
        syncWorkerTypeButtons();
        loadWorkers();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function syncWorkerTypeButtons() {
        document.querySelectorAll('.quick-filter-btn').forEach(btn => {
            btn.classList.remove('quick-filter-active');
            btn.classList.add('text-gray-300');
        });
        const target = currentWorkerType ? document.querySelector(`.quick-filter-btn[data-type="${currentWorkerType}"]`) : document.querySelector('.quick-filter-btn[data-type="all"]');
        if (target) {
            target.classList.add('quick-filter-active');
            target.classList.remove('text-gray-300');
        }
    }

    function presetKeyword(keyword) {
        document.getElementById('search-input').value = keyword;
        currentKeyword = keyword;
        currentPage = 1;
        loadWorkers();
    }

    function doSearch() {
        currentKeyword = document.getElementById('search-input').value.trim();
        currentPage = 1;
        loadWorkers();
    }

    document.getElementById('search-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });

    // 加载员工列表
    async function loadWorkers() {
        const sortBy = document.getElementById('sort-select').value;
        let url = `/api/workers?page=${currentPage}&per_page=12&sort_by=${sortBy}`;
        if (currentCategory) url += `&category_id=${currentCategory}`;
        if (currentKeyword) url += `&keyword=${encodeURIComponent(currentKeyword)}`;
        if (currentWorkerType) url += `&worker_type=${encodeURIComponent(currentWorkerType)}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            renderWorkers(data.workers);
            document.getElementById('total-count').textContent = data.total;
            document.getElementById('result-label').textContent = currentWorkerType === 'agent_service' ? '官方机器人共' : '共';
            renderPagination(data.page, data.pages);
        } catch(e) {
            document.getElementById('workers-grid').innerHTML = '<div class="col-span-full text-center py-20 text-red-400">加载失败，请刷新重试</div>';
        }
    }

    function renderWorkers(workers) {
        const grid = document.getElementById('workers-grid');
        if (!workers || workers.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">暂无数字员工，换个条件试试？</div>';
            return;
        }
        grid.innerHTML = workers.map(w => `
            <a href="worker-detail.html?id=${w.id}" class="glass-morphism p-6 rounded-3xl card-hover border-transparent border-2 block cursor-pointer transition-all">
                <div class="flex justify-between items-start mb-4">
                    <div class="relative">
                        <div class="w-16 h-16 rounded-2xl flex items-center justify-center" style="background: linear-gradient(135deg, ${w.avatar_gradient_from}, ${w.avatar_gradient_to})">
                            <span class="iconify text-3xl" data-icon="${w.avatar_icon}"></span>
                        </div>
                        <div class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full border-2 border-[#050714] status-dot-${w.status}"></div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        ${w.worker_type === 'agent_service' ? '<span class="official-pill text-[10px] px-2 py-1 rounded-md uppercase tracking-widest">官方</span>' : ''}
                        <span class="bg-white/10 text-[10px] px-2 py-1 rounded-md uppercase tracking-widest">Lv. ${w.level}</span>
                    </div>
                </div>
                <h4 class="text-lg font-bold">${w.name}</h4>
                <div class="flex items-center text-xs text-gray-400 mt-1 mb-2">
                    <span class="iconify mr-1" data-icon="mdi:tag-outline"></span>${w.category_name}
                </div>
                ${w.worker_type === 'agent_service' ? `
                    <div class="flex items-center gap-2 mb-3">
                        <span class="text-[11px] px-2.5 py-1 rounded-full bg-cyan-400/10 border border-cyan-400/20 text-cyan-300">可部署 API</span>
                        <span class="text-[11px] px-2.5 py-1 rounded-full bg-white/5 border border-white/10 text-gray-300">托管交付</span>
                    </div>
                ` : ''}
                <div class="flex flex-wrap gap-1 mb-4">
                    ${w.skills.slice(0, 3).map(s => `<span class="bg-white/5 text-[10px] px-2 py-0.5 rounded text-gray-300">${s}</span>`).join('')}
                    ${w.skills.length > 3 ? `<span class="text-[10px] text-gray-500">+${w.skills.length - 3}</span>` : ''}
                </div>
                <div class="flex items-center mb-3">
                    ${renderStars(w.rating)}
                    <span class="text-xs text-gray-500 ml-2">${w.rating}</span>
                    <span class="text-xs text-gray-600 ml-auto">${w.total_orders} 次雇佣</span>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-white/10">
                    <div>
                        <p class="text-xs text-gray-500">${w.worker_type === 'agent_service' ? '官方套餐起' : w.billing_unit}</p>
                        <p class="font-bold text-lg">￥${Number(w.hourly_rate).toFixed(2)}${w.worker_type === 'agent_service' ? '<span class="text-xs text-gray-500 ml-1">/ 月</span>' : ''}</p>
                    </div>
                    <span class="bg-cyan-500/20 hover:bg-cyan-500 group transition p-3 rounded-xl">
                        <span class="iconify text-cyan-400 group-hover:text-black" data-icon="${w.worker_type === 'agent_service' ? 'mdi:rocket-launch-outline' : 'mdi:cart-plus'}"></span>
                    </span>
                </div>
            </a>
        `).join('');
    }

    function renderStars(rating) {
        const full = Math.floor(rating);
        const half = rating - full >= 0.5 ? 1 : 0;
        const empty = 5 - full - half;
        let html = '';
        for (let i = 0; i < full; i++) html += '<span class="iconify text-yellow-400 text-xs" data-icon="mdi:star"></span>';
        for (let i = 0; i < half; i++) html += '<span class="iconify text-yellow-400 text-xs" data-icon="mdi:star-half-full"></span>';
        for (let i = 0; i < empty; i++) html += '<span class="iconify text-gray-600 text-xs" data-icon="mdi:star-outline"></span>';
        return html;
    }

    function renderPagination(page, pages) {
        const container = document.getElementById('pagination');
        if (pages <= 1) { container.innerHTML = ''; return; }
        let html = '';
        if (page > 1) html += `<button onclick="goPage(${page-1})" class="px-3 py-1 rounded bg-white/5 hover:bg-white/10 text-sm">&laquo;</button>`;
        for (let i = 1; i <= pages; i++) {
            if (i === page) {
                html += `<button class="px-3 py-1 rounded bg-[#6A0DAD] text-white text-sm font-bold">${i}</button>`;
            } else if (Math.abs(i - page) <= 2 || i === 1 || i === pages) {
                html += `<button onclick="goPage(${i})" class="px-3 py-1 rounded bg-white/5 hover:bg-white/10 text-sm">${i}</button>`;
            } else if (Math.abs(i - page) === 3) {
                html += `<span class="text-gray-500">...</span>`;
            }
        }
        if (page < pages) html += `<button onclick="goPage(${page+1})" class="px-3 py-1 rounded bg-white/5 hover:bg-white/10 text-sm">&raquo;</button>`;
        container.innerHTML = html;
    }

    function goPage(p) { currentPage = p; loadWorkers(); window.scrollTo({top: 0, behavior: 'smooth'}); }

    // 初始化
    applyInitialFilters();
    loadCategories();
    loadOfficialAgents();
    loadWorkers();
</script>
</body>
</html>
