services:
  db:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_PASSWORD: ${DB_PASS:?DB_PASS is required}
    ports: []

  backend:
    environment:
      APP_ENV: production
      DB_PASS: ${DB_PASS:?DB_PASS is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      AGENT_PROVIDER: ${AGENT_PROVIDER:-dashscope}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?DASHSCOPE_API_KEY is required}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-max}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      DASHSCOPE_TEMPERATURE: ${DASHSCOPE_TEMPERATURE:-0.2}
      DASHSCOPE_TOP_P: ${DASHSCOPE_TOP_P:-0.8}
      DASHSCOPE_MAX_TOKENS: ${DASHSCOPE_MAX_TOKENS:-800}
      DASHSCOPE_TIMEOUT_SECONDS: ${DASHSCOPE_TIMEOUT_SECONDS:-30}
      DASHSCOPE_RETRY_ATTEMPTS: ${DASHSCOPE_RETRY_ATTEMPTS:-1}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      ADMIN_INIT_USERNAME: ${ADMIN_INIT_USERNAME:-admin}
      ADMIN_INIT_EMAIL: ${ADMIN_INIT_EMAIL:-admin@xiaxia.factory}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:?ADMIN_INIT_PASSWORD is required}
      KONGKONG_RUNTIME_MODE: ${KONGKONG_RUNTIME_MODE:-docker}
      KONGKONG_BASE_DIR: ${KONGKONG_BASE_DIR:?KONGKONG_BASE_DIR is required}
      KONGKONG_DOCKER_NETWORK: ${KONGKONG_DOCKER_NETWORK:-xiaxia-platform}
      KONGKONG_EXPOSE_DEBUG_PORTS: ${KONGKONG_EXPOSE_DEBUG_PORTS:-0}
    ports: []

  frontend:
    ports:
      - "${FRONTEND_PORT:-80}:80"
