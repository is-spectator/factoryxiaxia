version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: xiaxia-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secret_2026
      MYSQL_DATABASE: ${DB_NAME:-xiaxia_factory}
      MYSQL_USER: ${DB_USER:-xiaxia}
      MYSQL_PASSWORD: ${DB_PASS:-xiaxia_secret_2026}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: xiaxia-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_USER: ${DB_USER:-xiaxia}
      DB_PASS: ${DB_PASS:-xiaxia_secret_2026}
      DB_HOST: ${DB_HOST:-db}
      DB_NAME: ${DB_NAME:-xiaxia_factory}
      JWT_SECRET: ${JWT_SECRET:-xiaxia-jwt-secret-key-2026}
      FLASK_ENV: ${FLASK_ENV:-production}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-60/minute}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-10/minute}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: xiaxia-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "0.0.0.0:10088:80"

volumes:
  db_data:
